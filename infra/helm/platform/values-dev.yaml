namespace:
  name: ytr-dev

service-filedownloader:
  minio:
    endpoint: "dev-platform-minio:9000"
    rawVideosBucket: "raw-videos-dev"
    secure: false

service-rssfeed:
  minio:
    endpoint: "dev-platform-minio:9000"
    rawVideosBucket: "raw-videos-dev"
    secure: false
  ingress:
    host: rss-feed-dev.local
    baseUrl: "http://rss-feed-dev.local"

minio:
  buckets:
    - raw-videos-dev

# Dev-specific monitoring overrides (lighter resources)
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 7d
      resources:
        requests:
          memory: 1Gi
          cpu: 500m
        limits:
          memory: 2Gi
          cpu: 1000m
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
  
  grafana:
    ingress:
      hosts:
        - grafana-dev.local
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 200m
    persistence:
      enabled: false  # Disable persistence in dev for simplicity
