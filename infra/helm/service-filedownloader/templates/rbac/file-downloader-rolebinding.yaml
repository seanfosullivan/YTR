apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-filedownloader-rb
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: service-filedownloader-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: service-filedownloader-role
  apiGroup: rbac.authorization.k8s.io