apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "minio.fullname" . }}-bucket-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ include "minio.fullname" . }}-bucket-init
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set minio http://{{ include "minio.fullname" . }}:{{ .Values.service.port }} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
                echo "Waiting for MinIO..."
                sleep 2
              done
              {{- range .Values.buckets }}
              mc mb minio/{{ . }} --ignore-existing || true
              echo "Bucket '{{ . }}' ready"
              {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "minio.fullname" . }}-creds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "minio.fullname" . }}-bucket-init
  namespace: {{ .Release.Namespace }}
  