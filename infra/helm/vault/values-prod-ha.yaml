server:

  dev:
    enabled: false
  ha:
    enabled: true

  replicas: 3

  dataStorage:
    enabled: true
    size: 10Gi
    mountPath: /vault/data

  auditStorage:
    enabled: true
    size: 5Gi
    mountPath: /vault/audit

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

ui:
  enabled: true
  serviceType: ClusterIP
  externalPort: 8200

