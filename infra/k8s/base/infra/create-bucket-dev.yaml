apiVersion: batch/v1
kind: Job
metadata:
  name: create-raw-videos-dev-bucket
  namespace: ytr-dev
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set minio http://dev-platform-minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
                echo "Waiting for MinIO..."
                sleep 2
              done
              mc mb minio/raw-videos-dev --ignore-existing || true
              echo "Bucket 'raw-videos-dev' ready"
              mc ls minio/
          envFrom:
            - secretRef:
                name: dev-platform-minio-creds
